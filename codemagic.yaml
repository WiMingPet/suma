workflows:
  ios-workflow:
    name: iOS Build
    environment:
      groups:
        - app_config  # 引入你刚创建的变量组
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sumaai.app
      vars:
        XCODE_SCHEME: "App"
        BUILD_NUMBER: 8
        MARKETING_VERSION: 1.0.8
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web project
        script: |
          npm run build:ios
          echo "Checking out folder..."
          ls -la out/
          if [ ! -d "out" ]; then
            echo "out folder missing!"
            exit 1
          fi
          if [ ! -f "out/index.html" ]; then
            echo "index.html missing in out folder!"
            exit 1
          fi
          echo "out folder verification passed"
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set build number  # <--- 新增这个步骤
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build iOS app
        script: |
          # 1. 清理旧构建
          xcodebuild clean -project ios/App/App.xcodeproj -scheme App
          # 2. 归档 (Archive)
          xcodebuild archive -project ios/App/App.xcodeproj -scheme App -archivePath $HOME/App.xcarchive CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="iPhone Distribution" PROVISIONING_PROFILE_SPECIFIER="SumaAppStore" DEVELOPMENT_TEAM=892N82TP6H
          # 3. 创建 exportOptions.plist 文件
          cat > $HOME/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>892N82TP6H</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.sumaai.app</key>
                  <string>SumaAppStore</string>
              </dict>
          </dict>
          </plist>
          EOF
          # 4. 导出 IPA
          xcodebuild -exportArchive -archivePath $HOME/App.xcarchive -exportPath $HOME -exportOptionsPlist $HOME/exportOptions.plist
    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/*.ipa
      - /Users/builder/Library/Developer/Xcode/DerivedData/App-*/Build/Products/Release-iphoneos/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
      email:
        recipients:
          - postmaster@sumaai.cn
        notify:
          success: true