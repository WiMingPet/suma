workflows:
  ios-workflow:
    name: iOS Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sumaai.app
      vars:
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web project
        script: |
          npm run build:ios
          echo "Checking out folder..."
          ls -la out/
          if [ ! -d "out" ]; then
            echo "out folder missing!"
            exit 1
          fi
          if [ ! -f "out/index.html" ]; then
            echo "index.html missing in out folder!"
            exit 1
          fi
          echo "out folder verification passed"
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS app
        script: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App -configuration Release -sdk iphoneos build CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="iPhone Distribution" PROVISIONING_PROFILE_SPECIFIER="SumaAppStore" DEVELOPMENT_TEAM=892N82TP6H
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - postmaster@sumaai.cn
        notify: success
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID