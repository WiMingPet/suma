workflows:
  ios-workflow:
    name: iOS Build
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sumaai.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor
        script: |
          npm install -g @capacitor/cli
          npx cap sync ios
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID